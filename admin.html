<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Catatan Kebun Ibu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f5f5f4; }
    </style>
</head>
<body class="text-stone-800 font-sans min-h-screen flex flex-col">

    <header class="bg-emerald-800 text-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                🌿 Mode Admin - Catetan Kebon Ibu
            </h1>
            <button onclick="logoutAdmin()" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition shadow-sm">
                Kaluar Panel
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 flex-grow grid grid-cols-1 md:grid-cols-3 gap-6 my-6">
        
        <section class="bg-white p-5 rounded-3xl shadow-sm border border-stone-200 md:col-span-1 h-fit">
            <h2 class="text-sm font-black text-emerald-800 mb-4 flex items-center gap-2">
                📢 Pengumuman Berjalan (Marquee)
            </h2>
            <div class="mb-4">
                <label class="block text-[11px] font-bold text-stone-500 mb-1">Pengumuman Ayeuna:</label>
                <div id="current-marquee" class="p-3 bg-amber-50 text-amber-800 border border-amber-200 rounded-xl italic text-xs text-center font-semibold">
                    Nuju marios...
                </div>
            </div>
            <form id="form-marquee" onsubmit="updateMarquee(event)">
                <div class="mb-4">
                    <label for="marquee-input" class="block text-[11px] font-bold text-stone-600 mb-1">Serat Teks Anyar:</label>
                    <textarea id="marquee-input" rows="3" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl text-xs focus:outline-emerald-600 focus:bg-white font-medium" placeholder="Serat pengumuman kebon di dieu..." required></textarea>
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-3 rounded-xl transition shadow-md">
                    Simpen & Publikasikeun
                </button>
            </form>
        </section>

        <section class="bg-white p-5 rounded-3xl shadow-sm border border-stone-200 md:col-span-2 flex flex-col">
            <h2 class="text-sm font-black text-emerald-800 mb-4 flex items-center gap-2">
                👥 Daptar Anggota Kebon & Kecap Sandi
            </h2>
            
            <div class="overflow-x-auto flex-grow">
                <table class="min-w-full divide-y divide-stone-200 text-xs">
                    <thead class="bg-stone-50">
                        <tr>
                            <th class="px-4 py-3 text-left font-bold text-stone-600 uppercase tracking-wider">Nami Panggero Ibu</th>
                            <th class="px-4 py-3 text-left font-bold text-stone-600 uppercase tracking-wider">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body" class="bg-white divide-y divide-stone-100 font-medium">
                        <tr>
                            <td colspan="2" class="px-4 py-4 text-center text-stone-400">Nuju marios daptar anggota...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <div id="password-modal" class="hidden fixed inset-0 bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl shadow-xl max-w-sm w-full p-5 relative border border-stone-100">
            <h3 class="text-sm font-black text-stone-800 mb-1">Ganti Kecap Sandi</h3>
            <p class="text-[11px] text-stone-500 mb-4">Ngarobih sandi kanggo akun: <span id="modal-username" class="font-bold text-emerald-700"></span></p>
            
            <form id="form-change-password" onsubmit="submitNewPassword(event)">
                <input type="hidden" id="modal-user-id">
                <div class="mb-4">
                    <label for="new-password" class="block text-[11px] font-bold text-stone-600 mb-1">Sandi Anyar:</label>
                    <input type="password" id="new-password" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl text-xs focus:outline-emerald-600 focus:bg-white font-medium" required placeholder="Lebetkeun sandi anyar">
                </div>
                <div class="flex justify-end gap-2 text-xs font-bold">
                    <button type="button" onclick="closePasswordModal()" class="px-4 py-2.5 border border-stone-300 rounded-xl text-stone-600 hover:bg-stone-50">
                        Batal
                    </button>
                    <button type="submit" class="px-4 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl shadow-md">
                        Simpen Sandi
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Nyaruakeun URL sareng KEY tina file index.html Ibu
        const SUPABASE_BASE_URL = "https://zaueuvplevtgkthqifsk.supabase.co";
        const SUPABASE_KEY = "sb_publishable_27mT7S6Eo9cBKN6xmujYqg_y2T20wSf";
        const authHeaders = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };

        // 1. PROTEKSI PANEL ADMIN (Nyaruakeun sareng sessionStorage tina index.html)
        if (sessionStorage.getItem('admin_auth_kebun') !== 'true') {
            alert('Akses ditolak! Ibu kedah lebet nganggo tombol admin rahasia.');
            window.location.href = 'index.html';
        }

        function logoutAdmin() {
            sessionStorage.removeItem('admin_auth_kebun');
            window.location.href = 'index.html';
        }

        // 2. NGALEBETKEUN / MARIOS MARQUEE
        async function fetchMarquee() {
            try {
                const res = await fetch(`${SUPABASE_BASE_URL}/rest/v1/pengumuman_kebun?select=pesan&aktif=eq.true&order=id.desc&limit=1`, { headers: authHeaders });
                if(res.ok) {
                    const data = await res.json();
                    const el = document.getElementById('current-marquee');
                    if(data.length > 0 && el) el.innerText = data[0].pesan;
                    else el.innerText = "Teu acan aya pengumuman anu aktif.";
                }
            } catch(e) {
                document.getElementById('current-marquee').innerText = "Gagal nyambung ka database.";
            }
        }

        async function updateMarquee(event) {
            event.preventDefault();
            const teksBaru = document.getElementById('marquee-input').value.trim();
            try {
                // Nganggo POST kanggo nambihan data pengumuman anyar anu aktif
                const res = await fetch(`${SUPABASE_BASE_URL}/rest/v1/pengumuman_kebun`, {
                    method: 'POST',
                    headers: authHeaders,
                    body: JSON.stringify({ pesan: teksBaru, aktif: true })
                });

                if (!res.ok) throw new Error("Gagal ngirim data.");

                alert('Pengumuman énggal parantos dipublikasikeun!');
                document.getElementById('marquee-input').value = '';
                fetchMarquee();
            } catch (err) {
                alert('Gagal nga-update pengumuman: ' + err.message);
            }
        }

        // 3. MARIOS DAPTAR ANGGOTA (Tabel: pengguna_kebun)
        async function fetchUsers() {
            try {
                const res = await fetch(`${SUPABASE_BASE_URL}/rest/v1/pengguna_kebun?select=id,nama_panggero&order=nama_panggero.asc`, { headers: authHeaders });
                if (!res.ok) throw new Error();
                const users = await res.json();

                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = '';

                if (users.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="2" class="px-4 py-4 text-center text-stone-400">Teu acan aya anggota anu daptar.</td></tr>`;
                    return;
                }

                users.forEach(user => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-stone-50 transition';
                    row.innerHTML = `
                        <td class="px-4 py-3 text-stone-800 font-bold">${user.nama_panggero}</td>
                        <td class="px-4 py-3">
                            <button onclick="openPasswordModal('${user.id}', '${user.nama_panggero}')" class="text-emerald-600 hover:text-emerald-800 font-bold cursor-pointer">
                                🔑 Ganti Sandi
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                document.getElementById('user-table-body').innerHTML = `<tr><td colspan="2" class="px-4 py-4 text-center text-rose-500">Gagal ngamuat data anggota kebon.</td></tr>`;
            }
        }

        // 4. LOGIKA MODAL GANTI SANDI ANGGOTA
        function openPasswordModal(id, nama) {
            document.getElementById('modal-user-id').value = id;
            document.getElementById('modal-username').innerText = nama;
            document.getElementById('new-password').value = '';
            document.getElementById('password-modal').classList.remove('hidden');
        }

        function closeModalPassword() {
            document.getElementById('password-modal').classList.add('hidden');
        }

        async function submitNewPassword(event) {
            event.preventDefault();
            const userId = document.getElementById('modal-user-id').value;
            const sandiBaru = document.getElementById('new-password').value;

            try {
                const res = await fetch(`${SUPABASE_BASE_URL}/rest/v1/pengguna_kebun?id=eq.${userId}`, {
                    method: 'PATCH',
                    headers: authHeaders,
                    body: JSON.stringify({ sandi: sandiBaru })
                });

                if (!res.ok) throw new Error();

                alert('Kecap sandi anggota parantos dirobih!');
                closeModalPassword();
            } catch (err) {
                alert('Gagal ngarobih sandi: ' + err.message);
            }
        }

        function closePasswordModal() {
            document.getElementById('password-modal').classList.add('hidden');
        }

        // 5. INISIALISASI DATA
        window.onload = function() {
            if (sessionStorage.getItem('admin_auth_kebun') === 'true') {
                fetchMarquee();
                fetchUsers();
            }
        };
    </script>
</body>
</html>
